<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChromeOS Chat</title>
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Placeholder for our dynamic manifest -->
    <link id="manifest-link" rel="manifest" href="">
    <style>
        /* Custom scrollbar to match native feel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        #install-button { display: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen w-full flex flex-col overflow-hidden">

    <!-- Main App Screen -->
    <div id="app-screen" class="flex flex-col h-full w-full">
        <!-- App Header -->
        <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center z-10 shrink-0">
            <div class="flex items-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <h1 class="text-xl font-bold tracking-tight">Offline Chat</h1>
            </div>
            
            <button id="install-button" class="flex items-center space-x-1 bg-white/20 hover:bg-white/30 transition-colors px-3 py-1.5 rounded-full text-sm font-medium cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                <span>Install App</span>
            </button>
        </header>

        <!-- Chat Messages Area -->
        <main id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col">
            <!-- Messages inject here -->
        </main>

        <!-- Input Area -->
        <footer class="bg-white p-4 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] shrink-0">
            <form id="message-form" class="flex space-x-2 max-w-4xl mx-auto">
                <input
                    type="text"
                    id="message-input"
                    placeholder="Type a message..."
                    autocomplete="off"
                    class="flex-1 bg-gray-100 border-transparent focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 rounded-full px-5 py-3 outline-none transition-all"
                />
                <button
                    type="submit"
                    id="send-button"
                    disabled
                    class="bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white rounded-full w-12 h-12 flex items-center justify-center transition-colors shadow-sm shrink-0"
                >
                    <svg class="w-5 h-5 ml-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </footer>
    </div>

    <script>
        // DOM Elements
        const messagesContainer = document.getElementById('messages-container');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const installButton = document.getElementById('install-button');

        // State: Local in-memory messages array
        let messages = [
            { text: "Welcome to Offline Chat! I'm a local bot. Try sending me a message.", isMe: false }
        ];

        // --- 1. PWA Magic: Make it Installable ---
        let deferredPrompt = null;

        function setupPWA() {
            // Listen for Chrome's install prompt event
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installButton.style.display = 'flex'; // Show the in-app install button
            });

            // Handle clicking our custom install button
            installButton.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installButton.style.display = 'none';
                    deferredPrompt = null;
                }
            });

            try {
                // Create manifest dynamically
                const manifest = {
                    name: "ChromeOS Chat",
                    short_name: "Chat App",
                    start_url: ".",
                    display: "standalone",
                    background_color: "#f3f4f6",
                    theme_color: "#2563eb",
                    icons: [{
                        src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMjU2M2ViIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PHBhdGggZD0iTTcuOSAyMEExMi4zOCAxMi4zOCAwIDAgMSAxNyA4YzAtNC43LTQuMy03LTktNy05IDBoLjJDMy42IDUuNiAzIDkuOCAzIDE0YzAgNC4zIDMuNCA3LjkgNy45IDZaIi8+PC9zdmc+",
                        sizes: "192x192",
                        type: "image/svg+xml",
                        purpose: "any maskable"
                    }]
                };
                
                // Inject manifest as a Data URI (more reliable for address bar icons when hosted)
                const manifestStr = JSON.stringify(manifest);
                document.getElementById('manifest-link').href = 'data:application/json;charset=utf-8,' + encodeURIComponent(manifestStr);

                // Inject a dummy Service Worker via Blob (Required for PWA installability)
                const swCode = `
                    self.addEventListener('install', (e) => self.skipWaiting());
                    self.addEventListener('activate', (e) => self.clients.claim());
                    self.addEventListener('fetch', (e) => {});
                `;
                const swBlob = new Blob([swCode], {type: 'application/javascript'});
                const swUrl = URL.createObjectURL(swBlob);
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register(swUrl).catch(() => console.log("SW registration bypassed in preview."));
                }
            } catch (err) {
                console.log("PWA injection skipped.");
            }
        }
        setupPWA();

        // --- 2. Chat Logic (Local Only) ---
        
        // Render messages to DOM
        function renderMessages() {
            messagesContainer.innerHTML = ''; // Clear container
            
            messages.forEach(msg => {
                const wrapper = document.createElement('div');
                wrapper.className = `flex w-full ${msg.isMe ? 'justify-end' : 'justify-start'}`;
                
                const bubble = document.createElement('div');
                bubble.className = `max-w-[75%] px-4 py-2 rounded-2xl shadow-sm ${
                    msg.isMe 
                        ? 'bg-blue-600 text-white rounded-br-none' 
                        : 'bg-white text-gray-800 rounded-bl-none border border-gray-200'
                }`;
                
                const textNode = document.createElement('p');
                textNode.className = "break-words leading-relaxed";
                textNode.textContent = msg.text; // Safe from XSS
                
                bubble.appendChild(textNode);
                wrapper.appendChild(bubble);
                messagesContainer.appendChild(wrapper);
            });

            // Auto-scroll to bottom
            setTimeout(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 50);
        }

        // Toggle send button state based on input
        messageInput.addEventListener('input', (e) => {
            sendButton.disabled = e.target.value.trim().length === 0;
        });

        // Handle Form Submission
        messageForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const textToSend = messageInput.value.trim();
            
            if (!textToSend) return;

            // 1. Add user's message
            messages.push({ text: textToSend, isMe: true });
            
            // Clear input
            messageInput.value = '';
            sendButton.disabled = true;
            renderMessages();

            // 2. Simulate Bot Reply after 1 second
            setTimeout(() => {
                const replies = [
                    "That's interesting!",
                    "Tell me more about that.",
                    "I am currently offline, but I hear you.",
                    "Haha, good one!",
                    "I'm just a simple script, but I agree."
                ];
                const randomReply = replies[Math.floor(Math.random() * replies.length)];
                
                messages.push({ text: randomReply, isMe: false });
                renderMessages();
            }, 1000);
        });

        // Initial render
        renderMessages();
    </script>
</body>
</html>
